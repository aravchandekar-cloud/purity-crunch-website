    <path d="M18 8C18 8 18 28 18 36" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M18 14C22 12 26 14 28 18" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M18 20C14 18 10 20 8 24" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>
