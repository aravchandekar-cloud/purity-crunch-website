      <stop offset="0%" style="stop-color:#2D7D5F"/>
      <stop offset="100%" style="stop-color:#1B4965"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4822A"/>
      <stop offset="100%" style="stop-color:#1B4965"/>
